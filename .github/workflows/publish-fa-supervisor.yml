name: Publish Factory Assistant Supervisor

# Builds the Factory Assistant Supervisor container for linux/amd64 and
# publishes it to the GitHub Container Registry under ghcr.io/esaueng.
# Triggered manually so a maintainer controls when a new image is cut.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag / SUPERVISOR_VERSION to build (e.g. 2026.06.0)"
        required: true
        default: "dev"

env:
  IMAGE: ghcr.io/esaueng/amd64-hassio-supervisor

jobs:
  build-and-publish:
    name: Build and publish amd64 image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            BUILD_VERSION=${{ github.event.inputs.version }}
          tags: |
            ${{ env.IMAGE }}:${{ github.event.inputs.version }}
            ${{ env.IMAGE }}:latest
